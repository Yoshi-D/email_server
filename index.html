<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MailDrop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg:       #0f0f11;
    --surface:  #17171a;
    --border:   #2a2a2f;
    --accent:   #4f8ef7;
    --accent2:  #f7694f;
    --green:    #4fbd7c;
    --yellow:   #f7c34f;
    --text:     #e8e8ec;
    --muted:    #666672;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #topbar .logo {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  #server-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background .4s;
  }
  #server-dot.online  { background: var(--green); }
  #server-dot.offline { background: var(--accent2); }
  #server-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  #queue-badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--yellow);
    display: none;
  }
  #user-info {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
  #btn-logout {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
  }
  #btn-logout:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-box {
    width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 36px;
  }
  .auth-box h2 {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
    margin-bottom: 24px;
    letter-spacing: 1px;
  }
  .auth-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .auth-tab {
    flex: 1;
    padding: 8px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .auth-tab.active {
    background: var(--accent);
    color: #fff;
  }
  label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  input, select, textarea {
    width: 100%;
    padding: 9px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    border-radius: 5px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 14px;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 90px; font-family: var(--sans); }
  .btn-primary {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 5px;
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .err-msg {
    color: var(--accent2);
    font-size: 12px;
    font-family: var(--mono);
    margin-top: 10px;
    min-height: 16px;
  }
  .ok-msg {
    color: var(--green);
    font-size: 12px;
    font-family: var(--mono);
    margin-top: 10px;
    min-height: 16px;
  }

  /* ── MAIN LAYOUT ── */
  #main-screen {
    flex: 1;
    display: none;
    overflow: hidden;
  }
  #main-screen.visible {
    display: flex;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 200px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    padding: 16px 0;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all .15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
  .nav-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: rgba(79,142,247,.07);
  }
  .nav-icon { font-size: 15px; }

  /* ── CONTENT AREA ── */
  #content {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .pane {
    display: none;
    flex: 1;
    flex-direction: column;
    overflow: hidden;
  }
  .pane.visible { display: flex; }

  /* ── COMPOSE ── */
  #pane-compose {
    padding: 28px;
    overflow-y: auto;
  }
  #pane-compose h3 {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .form-row { margin-bottom: 14px; }
  .priority-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }
  .priority-btn {
    flex: 1;
    padding: 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    border-radius: 5px;
    transition: all .2s;
  }
  .priority-btn.sel-low    { border-color: var(--green);   color: var(--green);   background: rgba(79,189,124,.08); }
  .priority-btn.sel-normal { border-color: var(--accent);  color: var(--accent);  background: rgba(79,142,247,.08); }
  .priority-btn.sel-high   { border-color: var(--accent2); color: var(--accent2); background: rgba(247,105,79,.08); }

  /* ── EMAIL LIST ── */
  .email-list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .email-list-header h3 {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 1px;
  }
  .btn-refresh {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
  .email-list {
    flex: 1;
    overflow-y: auto;
  }
  .email-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .email-item:hover { background: rgba(255,255,255,.03); }
  .email-item.unread { border-left: 3px solid var(--accent); }
  .email-item.selected { background: rgba(79,142,247,.07); }
  .email-meta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .email-from {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }
  .email-date {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
  }
  .email-subject {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .email-preview {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .priority-tag {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .p-low    { background: rgba(79,189,124,.15);  color: var(--green);   }
  .p-normal { background: rgba(79,142,247,.15);  color: var(--accent);  }
  .p-high   { background: rgba(247,105,79,.15);  color: var(--accent2); }

  /* ── EMAIL DETAIL ── */
  #email-detail {
    flex: 1;
    overflow: hidden;
    display: flex;
  }
  #detail-placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  #detail-view {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #detail-view.visible { display: flex; }
  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .detail-subject {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 10px;
  }
  .detail-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .detail-body {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
  }
  .inbox-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  .email-list-pane {
    width: 320px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    flex-direction: column;
    gap: 8px;
  }
  .empty-icon { font-size: 32px; opacity: .3; }

  /* ── LOADING ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span class="logo">MAILDROP</span>
  <div id="server-dot"></div>
  <span id="server-label">checking…</span>
  <span id="queue-badge">⚠ queued: <span id="queue-count">0</span></span>
  <span id="user-info" style="display:none"></span>
  <button id="btn-logout" style="display:none" onclick="logout()">logout</button>
</div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <h2>// MAILDROP</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <div id="tab-login">
      <div class="form-row">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn-primary" onclick="doLogin()">Login</button>
      <div id="login-msg" class="err-msg"></div>
    </div>

    <div id="tab-signup" style="display:none">
      <div class="form-row">
        <label>Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com"/>
      </div>
      <div class="form-row">
        <label>Password</label>
        <input id="signup-pass" type="password" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" onclick="doSignup()">Create Account</button>
      <div id="signup-msg" class="err-msg"></div>
    </div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="nav-item active" onclick="showPane('compose')" id="nav-compose">
      <span class="nav-icon">✏</span> Compose
    </div>
    <div class="nav-item" onclick="showPane('inbox')" id="nav-inbox">
      <span class="nav-icon">📥</span> Inbox
    </div>
  </div>

  <!-- Content -->
  <div id="content">

    <!-- Compose pane -->
    <div id="pane-compose" class="pane visible">
      <h3>// NEW MESSAGE</h3>
      <div class="form-row">
        <label>To</label>
        <input id="c-to" type="email" placeholder="recipient@example.com"/>
      </div>
      <div class="form-row">
        <label>Subject</label>
        <input id="c-subject" placeholder="Subject…"/>
      </div>
      <div class="form-row">
        <label>Priority</label>
        <div class="priority-row">
          <button class="priority-btn" id="pbtn-low"    onclick="setPriority('low')">Low</button>
          <button class="priority-btn sel-normal" id="pbtn-normal" onclick="setPriority('normal')">Normal</button>
          <button class="priority-btn" id="pbtn-high"   onclick="setPriority('high')">High</button>
        </div>
      </div>
      <div class="form-row">
        <label>Message</label>
        <textarea id="c-body" rows="8" placeholder="Type your message…"></textarea>
      </div>
      <button class="btn-primary" id="send-btn" onclick="sendEmail()">Send</button>
      <div id="send-msg" class="ok-msg"></div>
    </div>

    <!-- Inbox pane -->
    <div id="pane-inbox" class="pane">
      <div class="email-list-header">
        <h3>// INBOX</h3>
        <button class="btn-refresh" onclick="loadInbox()">↻ Refresh</button>
      </div>
      <div class="inbox-layout">
        <div class="email-list-pane">
          <div class="email-list" id="inbox-list"></div>
        </div>
        <div id="email-detail">
          <div id="detail-placeholder">← select a message</div>
          <div id="detail-view">
            <div class="detail-header">
              <div class="detail-subject" id="dv-subject"></div>
              <div class="detail-meta">
                <span id="dv-from"></span>
                <span id="dv-date"></span>
                <span id="dv-priority"></span>
              </div>
            </div>
            <div class="detail-body" id="dv-body"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main-screen -->

<script>
const PROXY = "http://localhost:9000";
let currentUser  = null;
let currentPass  = null;
let selectedPriority = "normal";
let inboxEmails  = [];

// ── SERVER STATUS POLL ──────────────────────
async function checkServer() {
  try {
    const r = await fetch(`${PROXY}/health`);
    const d = await r.json();
    const dot   = document.getElementById('server-dot');
    const label = document.getElementById('server-label');
    if (d.server === 'online') {
      dot.className = 'online';
      label.textContent = 'server online';
    } else {
      dot.className = 'offline';
      label.textContent = 'server offline';
    }
  } catch {
    document.getElementById('server-dot').className = 'offline';
    document.getElementById('server-label').textContent = 'proxy unreachable';
  }

  // Queue badge
  try {
    const r = await fetch(`${PROXY}/queue_status`);
    const d = await r.json();
    const badge = document.getElementById('queue-badge');
    if (d.queued > 0) {
      badge.style.display = 'block';
      document.getElementById('queue-count').textContent = d.queued;
    } else {
      badge.style.display = 'none';
    }
  } catch {}
}
checkServer();
setInterval(checkServer, 10000);

// ── AUTH TABS ───────────────────────────────
function switchTab(tab) {
  document.getElementById('tab-login').style.display  = tab === 'login'  ? '' : 'none';
  document.getElementById('tab-signup').style.display = tab === 'signup' ? '' : 'none';
  document.querySelectorAll('.auth-tab').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='login') || (i===1 && tab==='signup'));
  });
}

// ── SIGNUP ──────────────────────────────────
async function doSignup() {
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-pass').value;
  const msg   = document.getElementById('signup-msg');
  msg.className = 'err-msg'; msg.textContent = '';
  if (!email || !pass) { msg.textContent = 'Fill in all fields'; return; }
  try {
    const r = await fetch(`${PROXY}/signup`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const d = await r.json();
    if (!r.ok) { msg.textContent = d.detail || 'Error'; return; }
    msg.className = 'ok-msg';
    msg.textContent = 'Account created — you can now log in!';
  } catch { msg.textContent = 'Cannot reach proxy'; }
}

// ── LOGIN ───────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const msg   = document.getElementById('login-msg');
  msg.className = 'err-msg'; msg.textContent = '';
  if (!email || !pass) { msg.textContent = 'Fill in all fields'; return; }
  try {
    const r = await fetch(`${PROXY}/login`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const d = await r.json();
    if (!r.ok) { msg.textContent = d.detail || 'Invalid credentials'; return; }
    currentUser = email;
    currentPass = pass;
    enterApp();
  } catch { msg.textContent = 'Cannot reach proxy'; }
}

function enterApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-screen').classList.add('visible');
  document.getElementById('user-info').style.display = '';
  document.getElementById('user-info').textContent    = currentUser;
  document.getElementById('btn-logout').style.display = '';
}

function logout() {
  currentUser = null; currentPass = null; inboxEmails = [];
  document.getElementById('auth-screen').style.display = '';
  document.getElementById('main-screen').classList.remove('visible');
  document.getElementById('user-info').style.display = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  clearDetail();
}

// ── NAV ─────────────────────────────────────
function showPane(name) {
  ['compose','inbox'].forEach(p => {
    document.getElementById(`pane-${p}`).classList.toggle('visible', p===name);
    document.getElementById(`nav-${p}`).classList.toggle('active', p===name);
  });
  if (name === 'inbox') loadInbox();
}

// ── COMPOSE ─────────────────────────────────
function setPriority(p) {
  selectedPriority = p;
  ['low','normal','high'].forEach(x => {
    const btn = document.getElementById(`pbtn-${x}`);
    btn.className = 'priority-btn' + (x===p ? ` sel-${x}` : '');
  });
}

async function sendEmail() {
  const to      = document.getElementById('c-to').value.trim();
  const subject = document.getElementById('c-subject').value.trim();
  const body    = document.getElementById('c-body').value;
  const msgEl   = document.getElementById('send-msg');
  const btn     = document.getElementById('send-btn');
  msgEl.textContent = '';
  if (!to || !body) { msgEl.className='err-msg'; msgEl.textContent='Recipient and body required'; return; }

  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    const r = await fetch(`${PROXY}/send`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        sender: currentUser, password: currentPass,
        recipient: to, subject, body, priority: selectedPriority
      })
    });
    const d = await r.json();
    msgEl.className = d.queued ? 'err-msg' : 'ok-msg';
    msgEl.textContent = d.message;
    if (!d.queued) {
      document.getElementById('c-to').value = '';
      document.getElementById('c-subject').value = '';
      document.getElementById('c-body').value = '';
    }
  } catch { msgEl.className='err-msg'; msgEl.textContent='Cannot reach proxy'; }
  finally { btn.disabled = false; btn.textContent = 'Send'; }
}

// ── INBOX ────────────────────────────────────
async function loadInbox() {
  const list = document.getElementById('inbox-list');
  list.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
  try {
    const r = await fetch(`${PROXY}/inbox`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email: currentUser, password: currentPass})
    });
    if (!r.ok) {
      const d = await r.json();
      list.innerHTML = `<div class="empty-state"><span class="empty-icon">✗</span>${d.detail||'Error'}</div>`;
      return;
    }
    const d = await r.json();
    inboxEmails = d.emails || [];
    renderInbox();
  } catch {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">✗</span>Cannot reach proxy</div>`;
  }
}

function renderInbox() {
  const list = document.getElementById('inbox-list');
  if (inboxEmails.length === 0) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">📭</span>No messages</div>';
    return;
  }
  list.innerHTML = '';
  inboxEmails.forEach((e, i) => {
    const div = document.createElement('div');
    div.className = 'email-item';
    const p = e.priority || 'normal';
    const dateStr = e.date ? new Date(e.date).toLocaleString() : '';
    div.innerHTML = `
      <div class="email-meta">
        <span class="email-from">${esc(e.sender)}</span>
        <span class="priority-tag p-${p}">${p}</span>
        <span class="email-date">${dateStr}</span>
      </div>
      <div class="email-subject">${esc(e.subject) || '(no subject)'}</div>
      <div class="email-preview">${esc(e.body).substring(0,80)}</div>
    `;
    div.onclick = () => openEmail(i, div);
    list.appendChild(div);
  });
}

function openEmail(i, el) {
  document.querySelectorAll('.email-item').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');
  const e = inboxEmails[i];
  document.getElementById('dv-subject').textContent  = e.subject || '(no subject)';
  document.getElementById('dv-from').textContent     = `From: ${e.sender}`;
  document.getElementById('dv-date').textContent     = `Date: ${e.date || ''}`;
  document.getElementById('dv-priority').innerHTML   =
    `Priority: <span class="priority-tag p-${e.priority||'normal'}">${e.priority||'normal'}</span>`;
  document.getElementById('dv-body').textContent     = e.body;
  document.getElementById('detail-placeholder').style.display = 'none';
  document.getElementById('detail-view').classList.add('visible');
}

function clearDetail() {
  document.getElementById('detail-view').classList.remove('visible');
  document.getElementById('detail-placeholder').style.display = '';
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
